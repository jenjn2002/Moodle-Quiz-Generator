version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-giftuser}
      - DB_PASSWORD=${DB_PASSWORD:-giftpassword}
      - DB_NAME=${DB_NAME:-giftdb}
      - SESSION_SECRET=${SESSION_SECRET:-changeme-super-secret-key-32chars}
      - MS365_CLIENT_ID=${MS365_CLIENT_ID}
      - MS365_CLIENT_SECRET=${MS365_CLIENT_SECRET}
      - MS365_TENANT_ID=${MS365_TENANT_ID}
      - MS365_REDIRECT_URL=${MS365_REDIRECT_URL:-http://localhost:8080/auth/callback}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-giftuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-giftpassword}
      - POSTGRES_DB=${DB_NAME:-giftdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-giftuser} -d ${DB_NAME:-giftdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ports:
      - "5432:5432"

volumes:
  pgdata:
  uploads:
