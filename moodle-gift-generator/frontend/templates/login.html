<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIFT Generator — Đăng nhập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 80% at 20% 20%, rgba(59,130,246,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 80%, rgba(139,92,246,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(16,185,129,0.05) 0%, transparent 60%);
  }

  .grid-lines {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .card {
    position: relative; z-index: 10;
    background: rgba(17,24,39,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 48px 40px;
    width: 440px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 0 1px rgba(59,130,246,0.05), 0 40px 80px -20px rgba(0,0,0,0.6);
    animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(59,130,246,0.3);
  }

  .logo-text {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .logo-sub { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono'; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 36px; }

  .features {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 36px;
  }

  .feature {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: #94a3b8;
  }

  .feature-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--accent);
  }

  .btn-ms {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%;
    padding: 14px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px;
    color: white; font-size: 15px; font-weight: 600;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }

  .btn-ms:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(59,130,246,0.45);
  }

  .btn-ms svg { width: 20px; height: 20px; flex-shrink: 0; }

  .divider { 
    border: none; border-top: 1px solid var(--border); 
    margin: 24px 0; 
  }

  .disclaimer { 
    font-size: 11px; color: var(--muted); text-align: center; 
    line-height: 1.6;
  }

  .tag {
    display: inline-block;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    color: #60a5fa;
    font-size: 10px; font-family: 'JetBrains Mono';
    padding: 2px 8px; border-radius: 4px;
    margin-right: 4px;
  }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11.5px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
  .form-input {
    width: 100%; background: #111827; border: 1px solid #1e2d45;
    border-radius: 9px; padding: 10px 13px; color: var(--text);
    font-size: 13.5px; font-family: 'Sora', sans-serif; transition: 0.2s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
  .form-input::placeholder { color: #334155; }

  .btn-local {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px 20px;
    background: var(--surface);
    border: 1px solid #1e2d45; border-radius: 12px;
    color: var(--text); font-size: 14px; font-weight: 600;
    font-family: 'Sora', sans-serif; cursor: pointer;
    transition: all 0.2s; text-decoration: none;
    margin-bottom: 0;
  }
  .btn-local:hover { background: #1a2333; border-color: var(--accent); }

  .divider-row {
    display: flex; align-items: center; margin: 18px 0;
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="grid-lines"></div>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">GIFT Generator</div>
      <div class="logo-sub">Moodle Question AI</div>
    </div>
  </div>

  <h1>Chào mừng trở lại</h1>
  <p class="subtitle">Tạo câu hỏi Moodle GIFT tự động với AI.</p>

  <!-- Error message -->
  <div id="error-msg" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;">
    ⚠️ Tên đăng nhập hoặc mật khẩu không đúng
  </div>

  <!-- Local login form -->
  <form method="POST" action="/auth/local" id="local-form">
    <div class="form-group">
      <label class="form-label">Tên đăng nhập</label>
      <input class="form-input" type="text" name="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <div style="position:relative;">
        <input class="form-input" type="password" name="password" id="pwd-input" placeholder="••••••••" autocomplete="current-password" required style="padding-right:42px;">
        <button type="button" onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;font-size:16px;" id="pwd-eye">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-local">
      <span>🔐</span> Đăng nhập
    </button>
  </form>

  <div class="divider-row">
    <hr class="divider" style="flex:1;margin:0">
    <span style="font-size:11px;color:#334155;white-space:nowrap;padding:0 10px">hoặc</span>
    <hr class="divider" style="flex:1;margin:0">
  </div>

  <!-- MS365 SSO -->
  <a href="/auth/start" class="btn-ms">
    <svg viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
      <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Đăng nhập với Microsoft 365
  </a>

  <p class="disclaimer" style="margin-top:18px;">
    Đổi mật khẩu admin ngay sau khi đăng nhập lần đầu.
  </p>
</div>
<script>
// Show error if redirected with ?error=
const params = new URLSearchParams(location.search);
if (params.get('error')) {
  document.getElementById('error-msg').style.display = 'block';
}
function togglePwd() {
  const inp = document.getElementById('pwd-input');
  const eye = document.getElementById('pwd-eye');
  if (inp.type === 'password') { inp.type = 'text'; eye.textContent = '🙈'; }
  else { inp.type = 'password'; eye.textContent = '👁'; }
}
</script>
</body>
</html>
